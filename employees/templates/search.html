<h2>البحث عن موظف</h2>

<form method="post">
    {% csrf_token %}
    <input type="text" name="emp_id" placeholder="ادخل الرقم الوظيفي">
    <button type="submit">بحث</button>
</form>

{% if employee %}
    <h3>{{ employee.name }}</h3>
    <p>الوظيفة: {{ employee.job_title }}</p>
    <p>الراتب الصافي: {{ employee.net_salary }}</p>
{% elif employee is not None %}
    <p>لا يوجد موظف بهذا الرقم</p>
{% endif %}
