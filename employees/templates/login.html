<!DOCTYPE html>
<html>
<head>
    <title>تسجيل الدخول</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="card p-4 shadow" style="width: 400px;">
        <h3 class="text-center mb-4">تسجيل الدخول</h3>

        <form method="post">
            {% csrf_token %}

            <input type="text" name="username" class="form-control mb-3" placeholder="اسم المستخدم">
            <input type="password" name="password" class="form-control mb-3" placeholder="كلمة المرور">

            <button type="submit" class="btn btn-primary w-100">دخول</button>
        </form>

    </div>
</div>
<div style="text-align:center; margin-top:30px; color:black; font-size:20px; font-weight:bold;">
     By : Msc asraa mohsin
</div>
</body>
</html>
